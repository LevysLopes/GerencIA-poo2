<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GerencIA (Stoka) - Vendas</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { margin-bottom: 20px; border: 1px solid #ccc; padding: 10px; }
        label { display: block; margin-top: 10px; }
        input, select { margin-bottom: 10px; padding: 5px; width: 100%; max-width: 300px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #aaa; padding: 8px; text-align: left; }
    </style>
</head>
<body>

    <h1>GerencIA (Stoka) - Registro de Vendas</h1>
    
    <div style="margin-bottom: 20px;">
        <a href="dashboard.html" style="margin-right: 15px; text-decoration: none; color: blue;">⬅ Voltar ao Painel</a>
        <a href="produtos.html" style="margin-right: 15px; text-decoration: none; color: orange;">📦 Gerenciar Produtos</a>
        <a href="relatorios.html" style="text-decoration: none; color: purple;">📊 Ver Relatórios</a>
    </div>

    <div class="container">
        <h2>Nova Venda</h2>
        <form id="formVenda">
            <label>Selecione o Produto:</label>
            <select id="idProduto" required>
                <option value="">Carregando produtos...</option>
            </select>

            <label>Quantidade Vendida:</label>
            <input type="number" id="quantidade" min="1" required>

            <button type="submit" style="margin-top: 10px;">Registrar Venda</button>
        </form>
    </div>

    <div class="container">
        <h2>Últimas Vendas</h2>
        <table id="tabelaVendas">
            <thead>
                <tr>
                    <th>ID Venda</th>
                    <th>Produto (ID)</th>
                    <th>Quantidade</th>
                    <th>Data/Hora</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script>
        // Função NOVA: Puxa os produtos do Java e coloca na lista para o usuário escolher
        function carregarListaDeProdutos() {
            fetch('/produtos')
                .then(response => response.json())
                .then(produtos => {
                    const select = document.getElementById('idProduto');
                    select.innerHTML = '<option value="">-- Escolha um produto --</option>';
                    
                    produtos.forEach(p => {
                        // Mostra o ID, Nome e quanto tem no estoque!
                        select.innerHTML += `<option value="${p.id}">ID: ${p.id} - ${p.nome} (Estoque: ${p.estoque})</option>`;
                    });
                })
                .catch(error => console.error('Erro ao carregar produtos:', error));
        }

        // Função para carregar as vendas na tabela
        function carregarVendas() {
            fetch('/vendas')
                .then(response => response.json())
                .then(vendas => {
                    const tbody = document.querySelector('#tabelaVendas tbody');
                    tbody.innerHTML = ''; 
                   
                    vendas.forEach(venda => {
                        const tr = document.createElement('tr');
                        const dataFormatada = venda.data ? new Date(venda.data).toLocaleString('pt-BR') : '-';

                        tr.innerHTML = `
                            <td>${venda.id || '-'}</td>
                            <td>${venda.produtoId || '-'}</td>
                            <td>${venda.quantidade || '-'}</td>
                            <td>${dataFormatada}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => console.error('Erro ao carregar vendas:', error));
        }

        document.getElementById('formVenda').addEventListener('submit', function(event) {
            event.preventDefault();
           
            const novaVenda = {
                produtoId: parseInt(document.getElementById('idProduto').value),
                quantidade: parseInt(document.getElementById('quantidade').value)
            };

            fetch('/vendas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novaVenda)
            })
            .then(response => {
                if (response.ok) {
                    alert('Venda registrada com sucesso!');
                    document.getElementById('formVenda').reset();
                    carregarVendas(); 
                    carregarListaDeProdutos(); // Atualiza o estoque no Select
                } else {
                    alert('Erro ao registrar venda. Verifique se há estoque suficiente.');
                }
            })
            .catch(error => console.error('Erro:', error));
        });

        // Carrega tudo quando a página abre
        carregarListaDeProdutos();
        carregarVendas();
    </script>
</body>
</html>
