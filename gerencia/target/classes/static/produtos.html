<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GerencIA - Produtos</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { margin-bottom: 20px; border: 1px solid #ccc; padding: 10px; }
        label { display: block; margin-top: 10px; }
        input { margin-bottom: 10px; padding: 5px; width: 100%; max-width: 300px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #aaa; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>GerencIA - Produtos</h1>

    <div style="margin-bottom: 20px;">
        <a href="dashboard.html" style="margin-right: 15px;">Voltar ao Painel</a>
        <a href="vendas.html" style="margin-right: 15px;">Registrar Venda</a>
        <a href="relatorios.html">Ver Relatorios</a>
    </div>

    <div class="container">
        <h2>Novo Produto</h2>
        <form id="formProduto">
            <label>Nome:</label>
            <input type="text" id="nome" required>

            <label>Codigo de Barras:</label>
            <input type="text" id="codigoBarras">

            <label>Preco:</label>
            <input type="number" id="preco" min="0.01" step="0.01" required>

            <label>Estoque:</label>
            <input type="number" id="estoque" min="0" required>

            <label>Nivel Minimo:</label>
            <input type="number" id="nivelMinimo" min="0" required>

            <button type="submit">Salvar Produto</button>
        </form>
    </div>

    <div class="container">
        <h2>Produtos Cadastrados</h2>
        <table id="tabelaProdutos">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Cod. Barras</th>
                    <th>Preco</th>
                    <th>Estoque</th>
                    <th>Minimo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        function carregarJson(url) {
            return fetch(url).then(function(res) {
                if (!res.ok) throw new Error('Erro ' + res.status);
                return res.json();
            });
        }

        function carregarProdutos() {
            carregarJson('/produtos')
                .then(function(produtos) {
                    var tbody = document.querySelector('#tabelaProdutos tbody');
                    tbody.innerHTML = '';

                    produtos.forEach(function(produto) {
                        var preco = produto.preco !== null && produto.preco !== undefined
                            ? 'R$ ' + Number(produto.preco).toFixed(2)
                            : 'R$ 0.00';

                        var tr = document.createElement('tr');
                        tr.innerHTML =
                            '<td>' + produto.id + '</td>' +
                            '<td>' + produto.nome + '</td>' +
                            '<td>' + (produto.codigoBarras || '-') + '</td>' +
                            '<td>' + preco + '</td>' +
                            '<td>' + produto.estoque + '</td>' +
                            '<td>' + produto.nivelMinimo + '</td>';
                        tbody.appendChild(tr);
                    });
                })
                .catch(function() {
                    document.querySelector('#tabelaProdutos tbody').innerHTML =
                        '<tr><td colspan="6">Nao foi possivel carregar os produtos.</td></tr>';
                });
        }

        document.getElementById('formProduto').addEventListener('submit', function(event) {
            event.preventDefault();

            var novoProduto = {
                nome: document.getElementById('nome').value,
                codigoBarras: document.getElementById('codigoBarras').value,
                preco: parseFloat(document.getElementById('preco').value),
                estoque: parseInt(document.getElementById('estoque').value),
                nivelMinimo: parseInt(document.getElementById('nivelMinimo').value)
            };

            fetch('/produtos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(novoProduto)
            }).then(function(response) {
                if (response.ok) {
                    alert('Produto salvo com sucesso!');
                    document.getElementById('formProduto').reset();
                    carregarProdutos();
                    return;
                }
                response.json().then(function(erro) {
                    alert(erro.erro || 'Erro ao salvar produto.');
                });
            }).catch(function() {
                alert('Erro ao conectar com o servidor.');
            });
        });

        carregarProdutos();
    </script>
</body>
</html>
