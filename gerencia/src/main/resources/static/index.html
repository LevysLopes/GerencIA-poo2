<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GerencIA - Acesso</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 40px; }
        .login-container { max-width: 380px; margin: 0 auto; background: #fff; border: 1px solid #ccc; padding: 24px; border-radius: 4px; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; }
        button { margin-top: 16px; padding: 10px 14px; cursor: pointer; }
        .secundario { background: transparent; border: 0; color: #0066cc; padding-left: 0; }
        .oculto { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>GerencIA</h1>

        <form id="formLogin">
            <h2>Entrar</h2>
            <label>E-mail:</label>
            <input type="email" id="emailLogin" required>

            <label>Senha:</label>
            <input type="password" id="senhaLogin" required>

            <button type="submit">Entrar no Sistema</button>
        </form>

        <form id="formRegistro" class="oculto">
            <h2>Criar Conta</h2>
            <label>Nome:</label>
            <input type="text" id="nomeRegistro" required>

            <label>E-mail:</label>
            <input type="email" id="emailRegistro" required>

            <label>Senha:</label>
            <input type="password" id="senhaRegistro" minlength="6" required>

            <button type="submit">Registrar</button>
        </form>

        <button id="alternarModo" class="secundario" type="button">Criar uma conta</button>
    </div>

    <script>
        var modoRegistro = false;
        var formLogin = document.getElementById('formLogin');
        var formRegistro = document.getElementById('formRegistro');
        var alternarModo = document.getElementById('alternarModo');

        alternarModo.addEventListener('click', function() {
            modoRegistro = !modoRegistro;
            formLogin.classList.toggle('oculto', modoRegistro);
            formRegistro.classList.toggle('oculto', !modoRegistro);
            alternarModo.innerText = modoRegistro ? 'Ja tenho uma conta' : 'Criar uma conta';
        });

        function tratarErro(response, mensagemPadrao) {
            return response.json()
                .then(function(body) { alert(body.erro || mensagemPadrao); })
                .catch(function() { alert(mensagemPadrao); });
        }

        formLogin.addEventListener('submit', function(event) {
            event.preventDefault();

            fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('emailLogin').value,
                    senha: document.getElementById('senhaLogin').value
                })
            }).then(function(response) {
                if (response.ok) {
                    window.location.href = 'dashboard.html';
                    return;
                }
                tratarErro(response, 'Usuario ou senha incorretos.');
            }).catch(function() {
                alert('Erro ao conectar com o servidor.');
            });
        });

        formRegistro.addEventListener('submit', function(event) {
            event.preventDefault();

            fetch('/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: document.getElementById('nomeRegistro').value,
                    email: document.getElementById('emailRegistro').value,
                    senha: document.getElementById('senhaRegistro').value
                })
            }).then(function(response) {
                if (response.ok) {
                    alert('Conta criada com sucesso. Agora faca login.');
                    alternarModo.click();
                    formRegistro.reset();
                    return;
                }
                tratarErro(response, 'Erro ao criar conta.');
            }).catch(function() {
                alert('Erro ao conectar com o servidor.');
            });
        });
    </script>
</body>
</html>
